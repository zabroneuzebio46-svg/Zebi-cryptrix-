<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zebi Cryptrix</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0d0f14;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 340px;
            background-color: #161922;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #ff007f;
        }
        .brand-title {
            color: #ff007f;
            text-align: center;
            margin-bottom: 15px;
            font-size: 22px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(ff, 0, 127, 0.5);
        }
        #display {
            width: 100%;
            height: 65px;
            background-color: #0d0f14;
            border: 1px solid #2a2f42;
            color: #00ffcc;
            text-align: right;
            padding: 15px;
            font-size: 28px;
            border-radius: 8px;
            margin-bottom: 15px;
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #212636;
            color: #ffffff;
            transition: all 0.2s ease;
        }
        button:hover {
            background-color: #2b3247;
            transform: translateY(-2px);
        }
        button:active {
            transform: translateY(0);
        }
        .operator {
            background-color: #ff007f;
            color: white;
        }
        .operator:hover {
            background-color: #e0006c;
        }
        .clear {
            background-color: #31374d;
            color: #ff007f;
        }
        .clear:hover {
            background-color: #3d4560;
        }
        .equal {
            background-color: #00ffcc;
            color: #0d0f14;
        }
        .equal:hover {
            background-color: #00ccaa;
        }
        /* Sehemu ya Historia ya Mahesabu (Log) */
        .log-container {
            margin-top: 20px;
            border-top: 1px solid #2a2f42;
            padding-top: 15px;
        }
        .log-title {
            color: #8a92a6;
            font-size: 12px;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .log-box {
            max-height: 100px;
            overflow-y: auto;
            background-color: #0d0f14;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #2a2f42;
            font-size: 14px;
            color: #8a92a6;
            text-align: left;
        }
        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px dashed #1c2130;
            padding-bottom: 3px;
        }
        .log-entry span {
            color: #00ffcc;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 class="brand-title">ZEBI CRYPTRIX</h2>
    
    <input type="text" id="display" readonly placeholder="0">
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')">/</button>
        <button onclick="appendValue('*')">*</button>
        <button onclick="appendValue('-')">-</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('.')">.</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="equal" style="grid-row: span 2; height: 100%;" onclick="calculate()">=</button>
        
        <button onclick="appendValue('0')" style="grid-column: span 3;">0</button>
    </div>

    <!-- Sehemu ya Computation Log -->
    <div class="log-container">
        <div class="log-title">Computation Log</div>
        <div class="log-box" id="logBox">
            <div style="color: #4a536b; font-style: italic;">No history yet...</div>
        </div>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    const logBox = document.getElementById('logBox');
    let isFirstEntry = true;

    function appendValue(val) {
        display.value += val;
    }

    function clearDisplay() {
        display.value = '';
    }

    function calculate() {
        const expression = display.value;
        if (!expression) return;

        try {
            // Kufanya hesabu yenyewe
            const result = eval(expression);
            display.value = result;

            // Kuongeza kwenye Computation Log
            if (isFirstEntry) {
                logBox.innerHTML = ''; // Futa neno 'No history yet'
                isFirstEntry = false;
            }

            const logEntry = document.createElement('div');
            logEntry.className = 'log-entry';
            logEntry.innerHTML = `${expression} = <span>${result}</span>`;
            
            // Weka ya mwisho iwe juu
            logBox.insertBefore(logEntry, logBox.firstChild); 
            
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
                          </html>
